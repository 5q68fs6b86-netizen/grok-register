name: Register Grok Accounts

on:
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of accounts'
        required: true
        default: '1'

jobs:
  register:
    timeout-minutes: 120
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Google Chrome + Xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg xvfb fonts-liberation curl lsb-release
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/chrome.deb || sudo apt-get -f install -y
          google-chrome --version

      - name: Install Cloudflare WARP (full tunnel)
        run: |
          set -e
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update
          sudo apt-get install -y cloudflare-warp
          sudo systemctl enable --now warp-svc.service || true
          sudo systemctl restart warp-svc.service || true
          sleep 4
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode warp
          warp-cli --accept-tos connect
          for i in $(seq 1 40); do
            st=$(warp-cli --accept-tos status 2>/dev/null || true)
            echo "WARP status [$i]: $st"
            echo "$st" | grep -qi Connected && break
            sleep 2
          done
          echo "IPv4: $(curl -4 -s --max-time 15 https://ifconfig.me || true)"
          warp-cli --accept-tos status || true

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Generate config.json
        env:
          CLOUDFLARE_API_BASE: ${{ secrets.CLOUDFLARE_API_BASE }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_DOMAINS: ${{ secrets.CLOUDFLARE_DOMAINS }}
          REGISTER_COUNT: ${{ github.event.inputs.count || '1' }}
          GROK2API_REMOTE_BASE: ${{ secrets.GROK2API_REMOTE_BASE }}
          GROK2API_REMOTE_APP_KEY: ${{ secrets.GROK2API_REMOTE_APP_KEY }}
        run: |
          python3 << 'CFG'
          import json, os
          cfg = {
            "email_provider": "cloudflare",
            "cloudflare_api_base": os.environ["CLOUDFLARE_API_BASE"].rstrip("/"),
            "cloudflare_api_key": os.environ["CLOUDFLARE_API_KEY"],
            "cloudflare_auth_mode": "x-admin-auth",
            "cloudflare_path_domains": "/api/domains",
            "cloudflare_path_accounts": "/admin/new_address",
            "cloudflare_path_token": "/api/token",
            "cloudflare_path_messages": "/api/mails",
            "defaultDomains": os.environ["CLOUDFLARE_DOMAINS"],
            "proxy": "",
            "enable_nsfw": True,
            "register_count": int(os.environ.get("REGISTER_COUNT") or "1"),
            "user_agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/138.0.0.0 Safari/537.36",
            "grok2api_auto_add_local": False,
            "grok2api_pool_name": "ssoBasic",
            "grok2api_auto_add_remote": True,
            "grok2api_remote_base": os.environ["GROK2API_REMOTE_BASE"].rstrip("/"),
            "grok2api_remote_app_key": os.environ["GROK2API_REMOTE_APP_KEY"],
          }
          with open("config.json","w") as f: json.dump(cfg,f,indent=2)
          print("count=", cfg["register_count"])
          CFG

      - name: Run Grok Registration
        env:
          CI: "true"
          GROK_HEADLESS: "1"
          DISPLAY: ":99"
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          echo "start" | python grok_register_ttk.py cli
        timeout-minutes: 110

      - name: Upload accounts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accounts
          path: |
            accounts_*.txt
            mail_credentials.txt
            debug_*
          if-no-files-found: warn
          retention-days: 7
