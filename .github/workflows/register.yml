name: Register Grok Accounts

on:
  workflow_dispatch:
    inputs:
      count:
        description: 'Number of accounts to register'
        required: true
        default: '1'
      use_warp:
        description: 'Use Cloudflare WARP (1/0)'
        required: false
        default: '1'

jobs:
  register:
    timeout-minutes: 120
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg xvfb fonts-liberation curl lsb-release
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/chrome.deb || sudo apt-get -f install -y
          google-chrome --version

      - name: Install and connect Cloudflare WARP
        if: ${{ github.event.inputs.use_warp != '0' }}
        run: |
          set -e
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor -o /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          sudo apt-get update
          sudo apt-get install -y cloudflare-warp
          which warp-cli
          warp-cli --version || true

          # Ensure daemon is running
          sudo systemctl enable --now warp-svc.service || true
          sudo systemctl restart warp-svc.service || true
          sleep 3
          systemctl is-active warp-svc.service || true

          # Non-interactive TOS + registration (try multiple CLI variants)
          set +e
          # Prefer global --accept-tos before subcommand (official non-TTY form)
          warp-cli --accept-tos registration new
          code1=$?
          echo "registration new exit=$code1"
          if [ $code1 -ne 0 ]; then
            sudo warp-cli --accept-tos registration new
            echo "sudo registration exit=$?"
          fi
          # Some builds use separate accept
          warp-cli accept-tos 2>/dev/null || true
          sudo warp-cli accept-tos 2>/dev/null || true

          # Switch to proxy mode for browser consumption (HTTP proxy on 40000)
          warp-cli --accept-tos mode proxy || sudo warp-cli --accept-tos mode proxy || warp-cli mode proxy || sudo warp-cli mode proxy
          warp-cli --accept-tos proxy port 40000 || sudo warp-cli proxy port 40000 || warp-cli proxy port 40000 || true
          warp-cli --accept-tos connect || sudo warp-cli --accept-tos connect || warp-cli connect || sudo warp-cli connect
          set -e

          for i in $(seq 1 40); do
            st=$(warp-cli status 2>/dev/null || sudo warp-cli status 2>/dev/null || echo none)
            echo "WARP status [$i]: $st"
            echo "$st" | grep -Eiq "Connected|Status update: Connected|Proxy" && break
            # also success if proxy port is open
            if (echo >/dev/tcp/127.0.0.1/40000) >/dev/null 2>&1; then
              echo "proxy port 40000 is open"
              break
            fi
            sleep 2
          done

          echo "Direct IP:" $(curl -s --max-time 10 https://ifconfig.me || true)
          echo "Proxy IP:" $(curl -s --max-time 10 --proxy http://127.0.0.1:40000 https://ifconfig.me || echo failed)
          warp-cli status || sudo warp-cli status || true
          ss -lntp | grep 40000 || netstat -lntp 2>/dev/null | grep 40000 || true

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Generate config.json from secrets
        env:
          CLOUDFLARE_API_BASE: ${{ secrets.CLOUDFLARE_API_BASE }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_DOMAINS: ${{ secrets.CLOUDFLARE_DOMAINS }}
          REGISTER_COUNT: ${{ github.event.inputs.count || '1' }}
          GROK2API_REMOTE_BASE: ${{ secrets.GROK2API_REMOTE_BASE }}
          GROK2API_REMOTE_APP_KEY: ${{ secrets.GROK2API_REMOTE_APP_KEY }}
          PROXY: ${{ secrets.PROXY }}
          USE_WARP: ${{ github.event.inputs.use_warp || '1' }}
        run: |
          python3 << 'PY'
          import json, os, socket
          proxy = (os.environ.get("PROXY") or "").strip()
          use_warp = os.environ.get("USE_WARP", "1") != "0"
          if not proxy and use_warp:
              for port in (40000, 40001, 1080):
                  sock = socket.socket()
                  sock.settimeout(1)
                  try:
                      sock.connect(("127.0.0.1", port))
                      proxy = f"http://127.0.0.1:{port}"
                      print("using WARP local proxy", proxy)
                      break
                  except Exception as e:
                      print(f"port {port} not open: {e}")
                  finally:
                      sock.close()
          cfg = {
            "email_provider": "cloudflare",
            "cloudflare_api_base": os.environ["CLOUDFLARE_API_BASE"].rstrip("/"),
            "cloudflare_api_key": os.environ["CLOUDFLARE_API_KEY"],
            "cloudflare_auth_mode": "x-admin-auth",
            "cloudflare_path_domains": "/api/domains",
            "cloudflare_path_accounts": "/admin/new_address",
            "cloudflare_path_token": "/api/token",
            "cloudflare_path_messages": "/api/mails",
            "defaultDomains": os.environ["CLOUDFLARE_DOMAINS"],
            "proxy": proxy,
            "enable_nsfw": True,
            "register_count": int(os.environ.get("REGISTER_COUNT") or "1"),
            "user_agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/138.0.0.0 Safari/537.36",
            "grok2api_auto_add_local": False,
            "grok2api_local_token_file": "",
            "grok2api_pool_name": "ssoBasic",
            "grok2api_auto_add_remote": True,
            "grok2api_remote_base": os.environ["GROK2API_REMOTE_BASE"].rstrip("/"),
            "grok2api_remote_app_key": os.environ["GROK2API_REMOTE_APP_KEY"],
          }
          with open("config.json", "w", encoding="utf-8") as f:
            json.dump(cfg, f, indent=2, ensure_ascii=False)
          print("config.json written")
          print("count=", cfg["register_count"], "proxy_set=", bool(cfg["proxy"]), "proxy=", cfg["proxy"])
          PY

      - name: Run Grok Registration
        env:
          CI: "true"
          GROK_HEADLESS: "0"
          DISPLAY: ":99"
        run: |
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          echo "start" | python grok_register_ttk.py cli
        timeout-minutes: 110

      - name: Upload account files
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: accounts
          path: |
            accounts_*.txt
            mail_credentials.txt
          if-no-files-found: warn
          retention-days: 7
